<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="assets/kamath_robotics_favicon.svg">
  <title>Robot Playground — Kamath Robotics</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div id="canvas-container"></div>

  <div id="controls">

    <!-- Robot selector + info button -->
    <div class="selector-row">
      <div class="robot-selector">
        <select id="robotSelect">
          <option value="lekiwi" selected>LeKiwi</option>
          <option value="kr003">KR003</option>
          <option value="akros">AKROS</option>
        </select>
      </div>
      <button id="infoButton" class="info-button" aria-label="About this robot">ⓘ</button>
    </div>

    <!-- Controls section -->
    <div class="collapsible open" id="controlsSection">
      <div class="collapsible-header">
        <span>Controls</span>
        <span class="collapsible-icon">▾</span>
      </div>
      <div class="collapsible-content">

        <!-- Key grid -->
        <div class="key-grid">
          <div class="key-row">
            <div class="key" id="key-q">
              <span class="key-letter">Q</span>
              <span class="key-symbol">↺</span>
            </div>
            <div class="key movement-key" id="key-w">
              <span class="key-letter">W</span>
              <span class="key-symbol">↑</span>
            </div>
            <div class="key" id="key-e">
              <span class="key-letter">E</span>
              <span class="key-symbol">↻</span>
            </div>
          </div>
          <div class="key-row">
            <div class="key movement-key" id="key-a">
              <span class="key-letter">A</span>
              <span class="key-symbol">←</span>
            </div>
            <div class="key movement-key" id="key-s">
              <span class="key-letter">S</span>
              <span class="key-symbol">↓</span>
            </div>
            <div class="key movement-key" id="key-d">
              <span class="key-letter">D</span>
              <span class="key-symbol">→</span>
            </div>
          </div>
        </div>

        <!-- Velocity sliders -->
        <div class="slider-group">
          <div class="slider-item">
            <label for="linearVelocitySlider">
              Linear Vel: <span id="linearVelocityValue">0.10</span> m/s
            </label>
            <input type="range" id="linearVelocitySlider" min="0" max="0.2" step="0.01" value="0.1">
          </div>
          <div class="slider-item">
            <label for="angularVelocitySlider">
              Angular Vel: <span id="angularVelocityValue">0.79</span> rad/s
            </label>
            <input type="range" id="angularVelocitySlider" min="0" max="1.57" step="0.01" value="0.785398">
          </div>
        </div>

        <!-- E-Stop — always present in Controls regardless of profile -->
        <div class="key estop-key estop-wide" id="key-x">
          <span class="estop-label">E-STOP / X</span>
        </div>

      </div>
    </div>

    <!-- View section — always present regardless of profile -->
    <div class="collapsible open" id="viewSection">
      <div class="collapsible-header">
        <span>View</span>
        <span class="collapsible-icon">▾</span>
      </div>
      <div class="collapsible-content">
        <div class="view-buttons">
          <button id="axesButton" class="toggle-button">Axes</button>
          <button id="gridButton" class="toggle-button">Grid</button>
          <button id="resetButton">Reset</button>
        </div>
        <div id="cameraHints">
          <span class="hint-label">Camera Controls:</span>
          <div class="hint-icons">
          <!-- Left click + drag = Orbit -->
          <span class="hint-item" title="Left Click + Drag to Orbit">
            <svg xmlns="http://www.w3.org/2000/svg" width="11" height="14" viewBox="0 0 11 14" fill="none" aria-hidden="true">
              <rect x="0.75" y="0.75" width="9.5" height="12.5" rx="3.5" stroke="currentColor" stroke-width="1.2"/>
              <line x1="5.5" y1="0.75" x2="5.5" y2="6" stroke="currentColor" stroke-width="1.2"/>
              <path d="M0.75 5.5V4.25a3.5 3.5 0 0 1 3.5-3.5H5.5V6H0.75z" fill="currentColor"/>
            </svg>
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 13 13" fill="none" aria-hidden="true">
              <path d="M10.5 6.5a4 4 0 1 1-1.17-2.83" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              <path d="M7.5 2l2 1.5-1.5 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
          <span class="hint-divider">·</span>
          <!-- Right click + drag = Pan -->
          <span class="hint-item" title="Right Click + Drag to Pan">
            <svg xmlns="http://www.w3.org/2000/svg" width="11" height="14" viewBox="0 0 11 14" fill="none" aria-hidden="true">
              <rect x="0.75" y="0.75" width="9.5" height="12.5" rx="3.5" stroke="currentColor" stroke-width="1.2"/>
              <line x1="5.5" y1="0.75" x2="5.5" y2="6" stroke="currentColor" stroke-width="1.2"/>
              <path d="M5.5 0.75H6.75a3.5 3.5 0 0 1 3.5 3.5V6H5.5V0.75z" fill="currentColor"/>
            </svg>
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 13 13" fill="none" aria-hidden="true">
              <path d="M6.5 2v9M2 6.5h9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
              <path d="M5 3.5L6.5 2 8 3.5M5 9.5L6.5 11 8 9.5M3.5 5L2 6.5l1.5 1.5M9.5 5L11 6.5l-1.5 1.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
          <span class="hint-divider">·</span>
          <!-- Scroll = Zoom -->
          <span class="hint-item" title="Scroll to Zoom">
            <svg xmlns="http://www.w3.org/2000/svg" width="11" height="14" viewBox="0 0 11 14" fill="none" aria-hidden="true">
              <rect x="0.75" y="0.75" width="9.5" height="12.5" rx="3.5" stroke="currentColor" stroke-width="1.2"/>
              <rect x="4" y="2.5" width="3" height="5" rx="1.5" fill="currentColor"/>
            </svg>
            <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 13 13" fill="none" aria-hidden="true">
              <circle cx="5.5" cy="5.5" r="3.5" stroke="currentColor" stroke-width="1.4"/>
              <path d="M8.5 8.5L11.5 11.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
              <path d="M5.5 3.5v4M3.5 5.5h4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
            </svg>
          </span>
          </div>
        </div>
      </div>
    </div>

    <div id="loadingStatus">Loading models…</div>

  </div>

  <!-- Robot info card — toggled by ⓘ button; content injected by main.js on robot switch -->
  <div id="infoCard">
    <div class="info-card-header">
      <span class="info-card-title" id="infoCardTitle"></span>
      <button id="infoCardClose" class="info-card-close" aria-label="Close">✕</button>
    </div>
    <p id="aboutDescription" class="about-description"></p>
    <a id="aboutGithub" href="#" target="_blank" class="github-button">
      <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0112 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
      </svg>
      Source Code on GitHub
    </a>
  </div>

  <!-- Camera controls hint — bottom centre -->
  <div id="cameraHints">
    <span class="hint-item">
      <span class="hint-key">Left Click + Drag</span>
      <!-- Rotate icon: circular arrow -->
      <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 13 13" fill="none" aria-hidden="true">
        <path d="M10.5 6.5a4 4 0 1 1-1.17-2.83" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M7.5 2l2 1.5-1.5 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </span>
    <span class="hint-divider">·</span>
    <span class="hint-item">
      <span class="hint-key">Right Click + Drag</span>
      <!-- Pan icon: four-way arrow -->
      <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 13 13" fill="none" aria-hidden="true">
        <path d="M6.5 2v9M2 6.5h9" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        <path d="M5 3.5L6.5 2 8 3.5M5 9.5L6.5 11 8 9.5M3.5 5L2 6.5l1.5 1.5M9.5 5L11 6.5l-1.5 1.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </span>
    <span class="hint-divider">·</span>
    <span class="hint-item">
      <span class="hint-key">Scroll Up/Down</span>
      <!-- Zoom icon: magnifying glass with +/- -->
      <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 13 13" fill="none" aria-hidden="true">
        <circle cx="5.5" cy="5.5" r="3.5" stroke="currentColor" stroke-width="1.4"/>
        <path d="M8.5 8.5L11.5 11.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        <path d="M5.5 3.5v4M3.5 5.5h4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
    </span>
  </div>

  <div id="info">
    <a href="https://kamathrobotics.com/" target="_blank">
      <img src="assets/kamath_robotics_logo_dark.svg" alt="Kamath Robotics" id="logo">
    </a>
  </div>

  <!-- CDN dependencies loaded as classic scripts so THREE / URDFLoader become globals -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/STLLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/urdf-loader@0.12.6/umd/URDFLoader.js"></script>

  <!-- App entry point (ES module — deferred by default, runs after DOM + classic scripts) -->
  <script type="module" src="js/main.js"></script>

</body>
</html>
